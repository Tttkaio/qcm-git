<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - QCM GIT & GitHub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #f05033, #e84393); padding: 20px 30px; display: flex; align-items: center; gap: 15px; }
  .header h1 { font-size: 1.4rem; }
  .header .logo { font-size: 2rem; }
  .login-box { max-width: 400px; margin: 80px auto; background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px; }
  .login-box h2 { text-align: center; margin-bottom: 25px; color: #f05033; }
  input { width: 100%; padding: 12px 15px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 1rem; margin-bottom: 15px; }
  input:focus { outline: none; border-color: #f05033; }
  .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #f05033, #e84393); border: none; border-radius: 8px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .btn:hover { opacity: 0.9; }
  .btn-danger { background: #da3633; }
  .btn-small { width: auto; padding: 6px 14px; font-size: 0.85rem; margin-left: 8px; }
  .dashboard { padding: 25px; max-width: 1100px; margin: 0 auto; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; text-align: center; }
  .stat-card .num { font-size: 2.2rem; font-weight: 700; color: #f05033; }
  .stat-card .label { font-size: 0.85rem; color: #8b949e; margin-top: 5px; }
  table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 10px; overflow: hidden; }
  th { background: #21262d; padding: 12px 15px; text-align: left; font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 12px 15px; border-top: 1px solid #21262d; font-size: 0.9rem; vertical-align: middle; }
  tr:hover { background: #1c2128; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
  .badge-ok { background: #1a4731; color: #3fb950; }
  .badge-bloque { background: #4a1515; color: #f85149; }
  .badge-score { background: #1a3353; color: #58a6ff; }
  .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; color: #8b949e; }
  .alert { padding: 12px 18px; border-radius: 8px; margin-bottom: 15px; }
  .alert-error { background: #4a1515; border: 1px solid #f85149; color: #f85149; }
  .btn-refresh { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
  .btn-refresh:hover { background: #2d333b; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .violations-detail { font-size: 0.78rem; color: #e3b341; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">🐙</span>
  <div>
    <h1>Dashboard Admin — QCM GIT & GitHub</h1>
    <div style="font-size:0.85rem;opacity:0.8">Tableau de bord des résultats</div>
  </div>
</div>

<div id="loginSection" class="login-box">
  <h2>🔐 Connexion Admin</h2>
  <input type="password" id="passwordInput" placeholder="Mot de passe administrateur" onkeypress="if(event.key==='Enter')login()">
  <button class="btn" onclick="login()">Se connecter</button>
  <div id="loginError" class="alert alert-error" style="display:none;margin-top:15px"></div>
</div>

<div id="dashboardSection" class="dashboard" style="display:none">
  <div class="top-bar">
    <h2 style="color:#f05033">📊 Résultats des étudiants</h2>
    <div>
      <button class="btn-refresh" onclick="loadResults()">🔄 Actualiser</button>
      <button class="btn btn-danger btn-small" onclick="logout()" style="margin-left:10px">Déconnexion</button>
    </div>
  </div>

  <div class="stats" id="statsGrid"></div>

  <div class="section-title">LISTE DES PARTICIPANTS</div>
  <div id="alertZone"></div>
  <table id="resultsTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Nom</th>
        <th>Score</th>
        <th>%</th>
        <th>Violations</th>
        <th>Statut</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="resultsBody">
      <tr><td colspan="8" style="text-align:center;color:#8b949e;padding:30px">Chargement...</td></tr>
    </tbody>
  </table>
</div>

<script>
let adminPwd = '';

function login() {
  const pwd = document.getElementById('passwordInput').value;
  if (!pwd) return;
  adminPwd = pwd;
  loadResults(true);
}

function logout() {
  adminPwd = '';
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('dashboardSection').style.display = 'none';
  document.getElementById('passwordInput').value = '';
}

async function loadResults(isLogin = false) {
  try {
    const res = await fetch('/api/results', {
      headers: { 'x-admin-password': adminPwd }
    });

    if (res.status === 401) {
      document.getElementById('loginError').textContent = 'Mot de passe incorrect.';
      document.getElementById('loginError').style.display = 'block';
      adminPwd = '';
      return;
    }

    if (isLogin) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboardSection').style.display = 'block';
    }

    const data = await res.json();
    const resultats = data.resultats || [];
    renderStats(resultats);
    renderTable(resultats);
  } catch (err) {
    document.getElementById('alertZone').innerHTML = '<div class="alert alert-error">Erreur de connexion au serveur.</div>';
  }
}

function renderStats(resultats) {
  const total = resultats.length;
  const bloques = resultats.filter(r => r.bloque).length;
  const scores = resultats.filter(r => !r.bloque && r.score !== undefined);
  const moyenne = scores.length ? Math.round(scores.reduce((s,r) => s + r.pourcentage, 0) / scores.length) : 0;
  const reussis = scores.filter(r => r.pourcentage >= 50).length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">Participants</div></div>
    <div class="stat-card"><div class="num" style="color:#3fb950">${reussis}</div><div class="label">Réussis (≥50%)</div></div>
    <div class="stat-card"><div class="num" style="color:#e3b341">${moyenne}%</div><div class="label">Moyenne classe</div></div>
    <div class="stat-card"><div class="num" style="color:#f85149">${bloques}</div><div class="label">Bloqués (triche)</div></div>
  `;
}

function renderTable(resultats) {
  const tbody = document.getElementById('resultsBody');
  if (!resultats.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#8b949e;padding:30px">Aucun résultat pour l\'instant.</td></tr>';
    return;
  }

  tbody.innerHTML = resultats.map((r, i) => {
    const date = new Date(r.date).toLocaleString('fr-FR');
    const statut = r.bloque
      ? '<span class="badge badge-bloque">🚫 Bloqué</span>'
      : '<span class="badge badge-ok">✅ OK</span>';
    const scoreDisplay = r.score !== undefined
      ? `<span class="badge badge-score">${r.score}/${r.total}</span>`
      : '-';
    const pct = r.pourcentage !== undefined ? `${r.pourcentage}%` : '-';
    const viol = r.violations > 0
      ? `<span class="violations-detail">⚠️ ${r.violations}</span>`
      : '<span style="color:#8b949e">0</span>';
    const action = r.bloque
      ? `<button class="btn btn-small btn-danger" onclick="debloquer('${r.nom}')">Débloquer</button>`
      : `<button class="btn btn-small" style="background:#21262d;border:1px solid #30363d" onclick="supprimer('${r.nom}')">Supprimer</button>`;
    return `<tr>
      <td style="color:#8b949e">${i+1}</td>
      <td style="font-weight:600">${r.nom}</td>
      <td>${scoreDisplay}</td>
      <td>${pct}</td>
      <td>${viol}</td>
      <td>${statut}</td>
      <td style="color:#8b949e;font-size:0.82rem">${date}</td>
      <td>${action}</td>
    </tr>`;
  }).join('');
}

async function debloquer(nom) {
  if (!confirm(`Débloquer et supprimer le résultat de "${nom}" ?`)) return;
  try {
    const res = await fetch('/api/unblock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPwd },
      body: JSON.stringify({ nom })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('alertZone').innerHTML = `<div class="alert" style="background:#1a4731;border:1px solid #3fb950;color:#3fb950">✅ ${data.message}</div>`;
      loadResults();
    }
  } catch {}
}

async function supprimer(nom) {
  if (!confirm(`Supprimer le résultat de "${nom}" pour lui permettre de repasser ?`)) return;
  try {
    const res = await fetch('/api/unblock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPwd },
      body: JSON.stringify({ nom })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('alertZone').innerHTML = `<div class="alert" style="background:#1a4731;border:1px solid #3fb950;color:#3fb950">✅ Résultat de "${nom}" supprimé.</div>`;
      loadResults();
    }
  } catch {}
}
</script>
</body>
</html>
